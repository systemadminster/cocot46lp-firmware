name: Build QMK Firmware
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone BMP QMK
        run: |
          git clone --depth 1 --branch dev/ble_micro_pro \
            https://github.com/sekigon-gonnoc/qmk_firmware.git qmk_firmware

          - name: Copy keyboard files
          run: |
          mkdir -p qmk_firmware/keyboards/cocot46lp/keymaps/default
          cp keyboard.json   qmk_firmware/keyboards/cocot46lp/
          cp config.h        qmk_firmware/keyboards/cocot46lp/
          cp cocot46lp.h     qmk_firmware/keyboards/cocot46lp/
          cp cocot46lp.c     qmk_firmware/keyboards/cocot46lp/
          cp rules.mk        qmk_firmware/keyboards/cocot46lp/
          cp keymap.c        qmk_firmware/keyboards/cocot46lp/keymaps/default/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
          pip3 install qmk

      - name: Build firmware
        run: |
          cd qmk_firmware
          touch testlist.mk
          make cocot46lp:default SKIP_GIT=yes

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cocot46lp_firmware
          path: qmk_firmware/.build/*.hex
