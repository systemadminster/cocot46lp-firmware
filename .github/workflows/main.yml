name: Build QMK Firmware
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone BMP QMK
        run: git clone --depth 1 --branch dev/ble_micro_pro https://github.com/sekigon-gonnoc/qmk_firmware.git qmk_firmware

      - name: Copy keyboard files
        run: |
          mkdir -p qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp
          cp config.h qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp/
          cp rules.mk qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp/
          cp keymap.c qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
          cat << 'QMKEOF' | sudo tee /usr/local/bin/qmk > /dev/null
          #!/bin/bash
          subcmd="${1:-}"
          shift
          output=""
          while [[ $# -gt 0 ]]; do
              case "$1" in
                  -o) output="$2"; shift 2 ;;
                  *) shift ;;
              esac
          done
          case "$subcmd" in
              generate-*)
                  if [[ -n "$output" ]]; then
                      mkdir -p "$(dirname "$output")"
                      printf '#pragma once\n' > "$output"
                  fi
                  ;;
          esac
          exit 0
          QMKEOF
          sudo chmod +x /usr/local/bin/qmk

      - name: Build firmware
        run: |
          cd qmk_firmware
          touch testlist.mk
          make ble_micro_pro:cocot46lp SKIP_GIT=yes

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cocot46lp_firmware
          path: qmk_firmware/.build/*.hex
