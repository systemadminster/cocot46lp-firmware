name: Build QMK Firmware
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache QMK BMP clone
        id: cache-qmk
        uses: actions/cache@v4
        with:
          path: qmk_firmware
          key: qmk-bmp-v1

      - name: Clone BMP QMK
        if: steps.cache-qmk.outputs.cache-hit != 'true'
        run: git clone --depth 1 --single-branch --branch dev/ble_micro_pro https://github.com/sekigon-gonnoc/qmk_firmware.git qmk_firmware

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-gcc-arm-${{ runner.os }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi

      - name: Copy keyboard files
        run: |
          mkdir -p qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp
          cp config.h qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp/
          cp rules.mk qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp/
          cp keymap.c qmk_firmware/keyboards/ble_micro_pro/keymaps/cocot46lp/

      - name: Build firmware
        run: |
          cd qmk_firmware
          touch testlist.mk
          printf '#pragma once\n#define QMK_VERSION "BMP"\n#define QMK_BUILDDATE "2024-01-01-00:00:00"\n' > quantum/version.h
          mkdir -p .build/obj_ble_micro_pro/src
          printf '#pragma once\n' > .build/obj_ble_micro_pro/src/info_config.h
          printf '#pragma once\n' > .build/obj_ble_micro_pro/src/layouts.h
          printf '#pragma once\n' > .build/obj_ble_micro_pro/src/ble_micro_pro.h
          printf '' > .build/obj_ble_micro_pro/src/ble_micro_pro.c
          make ble_micro_pro:cocot46lp SKIP_GIT=yes
          echo "--- Build output files ---"
          ls -la .build/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cocot46lp_firmware
          path: qmk_firmware/.build/ble_micro_pro_cocot46lp.hex
